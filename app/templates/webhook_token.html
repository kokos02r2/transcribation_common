<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CodeCrafters | Webhook Токен</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="/admin-lte/plugins/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="/admin-lte/dist/css/adminlte.min.css">
</head>
<body class="hold-transition layout-top-nav">
<div class="wrapper">

  <nav class="main-header navbar navbar-expand-md navbar-light navbar-white">
    <div class="container">
      <a href="#" class="navbar-brand">
        <img src="/admin-lte/dist/img/AdminLTELogo.png" alt="AdminLTE Logo" class="brand-image img-circle elevation-3" style="opacity: .8">
        <span class="brand-text font-weight-light">CodeCrafters</span>
      </a>

      <button class="navbar-toggler order-1" type="button" data-toggle="collapse" data-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse order-3" id="navbarCollapse">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a href="/dashboard" class="nav-link">Статистика</a>
          </li>
          <li class="nav-item">
            <a href="/api_token" class="nav-link">API токен</a>
          </li>
          <li class="nav-item">
            <a href="/webhook_token" class="nav-link active">Webhook токен</a>
          </li>
        </ul>
      </div>

      <ul class="order-1 order-md-3 navbar-nav navbar-no-expand ml-auto">
        <li class="nav-item">
          <button id="logoutBtn" class="btn nav-link" title="Logout">
            <i class="fas fa-sign-out-alt"></i> Выход
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <div class="content-wrapper">
    <div class="content-header">
      <div class="container">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1 class="m-0">Webhook Токен</h1>
          </div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="container">
        <div class="row">
          <div class="col-lg-12">
            <div class="card">
              <div class="card-body">
                <div class="d-flex align-items-center">
                  <p id="webhookTokenDisplay" class="mb-0 mr-2">**********</p>
                  <button id="toggleTokenBtn" class="btn btn-sm btn-outline-secondary" title="Показать токен">
                    <i class="fas fa-eye"></i>
                  </button>
                </div>
                <button id="generateWebhookTokenBtn" class="btn btn-primary mt-2">Сгенерировать Webhook токен</button>
                <button id="deleteWebhookTokenBtn" class="btn btn-danger ml-2 mt-2">Удалить Webhook токен</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="main-footer">
    <strong>Copyright © 2014-2021 <a href="https://adminlte.io">AdminLTE.io</a>.</strong> All rights reserved.
  </footer>
</div>

<script src="/admin-lte/plugins/jquery/jquery.min.js"></script>
<script src="/admin-lte/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/admin-lte/dist/js/adminlte.min.js"></script>

<script>
  // Проверка авторизации при загрузке страницы
  fetch('/audio_usage/', {  // Обновлённый путь с /api/
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({
      start_date: "2023-01-01",  // Фиктивная дата начала
      end_date: "2023-01-02"     // Фиктивная дата окончания
    }),
    credentials: 'include',
  }).then(response => {
    if (response.status === 401) {
      window.location.href = '/login';
    }
  });

  // Переменная для хранения токена
  let webhookToken = null;

  // Загрузка текущего Webhook токена при открытии страницы
  async function loadWebhookToken() {
    try {
      const response = await fetch('/get_webhook_token/', {
        method: 'GET',
        credentials: 'include',
      });
      if (!response.ok) {
        if (response.status === 404) {
          webhookToken = null;
        } else {
          throw new Error('Ошибка загрузки токена');
        }
      } else {
        const data = await response.json();
        webhookToken = data.webhook_token;
      }
    } catch (error) {
      console.error('Ошибка:', error);
      webhookToken = 'Ошибка загрузки токена';
    }
  }

  // Переключение видимости токена
  document.getElementById('toggleTokenBtn').addEventListener('click', () => {
    const tokenDisplay = document.getElementById('webhookTokenDisplay');
    const toggleBtn = document.getElementById('toggleTokenBtn');
    if (tokenDisplay.textContent === '**********') {
      if (webhookToken) {
        tokenDisplay.textContent = `Webhook токен: ${webhookToken}`;
        toggleBtn.innerHTML = '<i class="fas fa-copy"></i>';
        toggleBtn.title = 'Скопировать токен';
        toggleBtn.onclick = () => {
          navigator.clipboard.writeText(webhookToken).then(() => {
            alert('Токен скопирован в буфер обмена!');
          });
        };
      } else {
        tokenDisplay.textContent = 'Токен не сгенерирован';
      }
    }
  });

  // Вызываем загрузку токена при загрузке страницы
  loadWebhookToken();

  // Генерация Webhook токена
  document.getElementById('generateWebhookTokenBtn').addEventListener('click', async () => {
    try {
      const response = await fetch('/generate_webhook_token/', {
        method: 'POST',
        credentials: 'include',
      });
      if (!response.ok) throw new Error('Ошибка генерации Webhook токена');
      const data = await response.json();
      webhookToken = data.webhook_token;
      document.getElementById('webhookTokenDisplay').textContent = '**********'; // Сбрасываем на звёздочки
    } catch (error) {
      alert('Ошибка: ' + error.message);
    }
  });

  // Удаление Webhook токена
  document.getElementById('deleteWebhookTokenBtn').addEventListener('click', async () => {
    try {
      const response = await fetch('/delete_webhook_token/', {
        method: 'DELETE',
        credentials: 'include',
      });
      if (!response.ok) throw new Error('Ошибка удаления Webhook токена');
      const data = await response.json();
      webhookToken = null;
      document.getElementById('webhookTokenDisplay').textContent = '**********';
      const toggleBtn = document.getElementById('toggleTokenBtn');
      toggleBtn.innerHTML = '<i class="fas fa-eye"></i>';
      toggleBtn.title = 'Показать токен';
      toggleBtn.onclick = toggleWebhookToken; // Восстанавливаем исходный обработчик
      alert(data.message);
    } catch (error) {
      alert('Ошибка: ' + error.message);
    }
  });

  // Функция переключения токена (для восстановления)
  function toggleWebhookToken() {
    const tokenDisplay = document.getElementById('webhookTokenDisplay');
    const toggleBtn = document.getElementById('toggleTokenBtn');
    if (tokenDisplay.textContent === '**********') {
      if (webhookToken) {
        tokenDisplay.textContent = `Webhook токен: ${webhookToken}`;
        toggleBtn.innerHTML = '<i class="fas fa-copy"></i>';
        toggleBtn.title = 'Скопировать токен';
        toggleBtn.onclick = () => {
          navigator.clipboard.writeText(webhookToken).then(() => {
            alert('Токен скопирован в буфер обмена!');
          });
        };
      } else {
        tokenDisplay.textContent = 'Токен не сгенерирован';
      }
    }
  }

  // Обработчик выхода
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      const response = await fetch('/auth/jwt/logout', {
        method: 'POST',
        credentials: 'include',
      });
      if (!response.ok) throw new Error('Ошибка при выходе');
      window.location.href = '/login';
    } catch (error) {
      console.error('Ошибка:', error);
      alert('Ошибка при выходе');
    }
  });
</script>
</body>
</html>
