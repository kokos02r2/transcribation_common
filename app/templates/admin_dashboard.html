<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Сервис транскрипции | Админ</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback"
    />
    <link rel="stylesheet" href="/static/css/all.min.css" />
    <link rel="stylesheet" href="/static/css/adminlte.min.css" />
    <link rel="stylesheet" href="/static/css/dashboard.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="hold-transition layout-top-nav">
    <div class="wrapper">
      <nav class="main-header navbar navbar-expand-md navbar-light navbar-white">
        <div class="container">
          <a href="#" class="navbar-brand">
            <img
              src="/static/img/lion_logo.png"
              alt="Logo"
              style="opacity: 0.8; width: 50px; height: 50px"
            />
            <span class="brand-text font-weight-light">{{ username }}</span>
          </a>

          <button
            class="navbar-toggler order-1"
            type="button"
            data-toggle="collapse"
            data-target="#navbarCollapse"
            aria-controls="navbarCollapse"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse order-3" id="navbarCollapse">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a href="/dashboard" class="nav-link">Статистика</a>
              </li>
              <li class="nav-item">
                <a href="/admin/dashboard" class="nav-link active">Админ</a>
              </li>
            </ul>
          </div>

          <ul class="order-1 order-md-3 navbar-nav navbar-no-expand ml-auto">
            <li class="nav-item">
              <button id="logoutBtn" class="btn nav-link" title="Logout">
                <i class="fas fa-sign-out-alt"></i> Выход
              </button>
            </li>
          </ul>
        </div>
      </nav>

      <div class="content-wrapper">
        <div class="content-header">
          <div class="container">
            <div class="row mb-2">
              <div class="col-sm-6">
                <h1 class="m-0 ml-3">Статистика (Админ)</h1>
              </div>
            </div>
          </div>
        </div>

        <div class="content">
          <div class="container">
            <div class="row">
              <div class="col-12">
                <div class="card card-outline card-secondary collapsed-card">
                  <div class="card-header">
                    <h3 class="card-title">Фильтры</h3>
                    <div class="card-tools">
                      <button type="button" class="btn btn-tool" data-card-widget="collapse">
                        <i class="fas fa-plus"></i>
                      </button>
                    </div>
                  </div>
                  <div class="card-body">
                    <div class="row">
                      <div class="col-lg-5">
                        <h5 class="mb-2">Пользователи</h5>
                        <div class="d-flex justify-content-between align-items-center mb-2">
                          <button id="selectAllBtn" type="button" class="btn btn-sm btn-outline-primary">
                            Выбрать всех
                          </button>
                          <button id="clearAllBtn" type="button" class="btn btn-sm btn-outline-secondary">
                            Снять
                          </button>
                        </div>
                        <div class="form-group mb-2">
                          <input
                            id="userSearch"
                            type="text"
                            class="form-control"
                            placeholder="Поиск по email..."
                          />
                        </div>
                        <div
                          id="usersList"
                          style="max-height: 320px; overflow: auto; border: 1px solid #e0e0e0; border-radius: 4px; padding: 10px;"
                        >
                          <div class="text-muted">Загрузка...</div>
                        </div>
                        <small class="text-muted d-block mt-2">
                          Если никого не выбрать, будет показана статистика по всем не-superuser.
                        </small>
                      </div>

                      <div class="col-lg-7">
                        <h5 class="mb-2">Период</h5>
                        <form id="dateForm" class="mb-0">
                          <div class="row">
                            <div class="col-md-6 col-12">
                              <label for="startDate">Начальная дата:</label>
                              <input type="date" id="startDate" class="form-control" required />
                            </div>
                            <div class="col-md-6 col-12">
                              <label for="endDate">Конечная дата:</label>
                              <input type="date" id="endDate" class="form-control" required />
                            </div>
                          </div>
                        </form>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="col-12">
                <div class="card">
                  <div class="card-body">
                    <h5 class="card-title large-title">
                      Расход за период:
                      <span id="cost" class="large-cost">0</span> руб.
                    </h5>
                    <br /><br />

                    <div class="row mb-4">
                      <div class="col-md-4">
                        <div class="card">
                          <div class="card-body">
                            <h5 class="card-title">Минуты без речи</h5>
                            <p class="card-text display-6" id="noSpeechMinutes">0</p>
                          </div>
                        </div>
                      </div>
                      <div class="col-md-4">
                        <div class="card">
                          <div class="card-body">
                            <h5 class="card-title">Минуты транскрипция</h5>
                            <p class="card-text display-6" id="speechTranscriptionMinutes">0</p>
                          </div>
                        </div>
                      </div>
                      <div class="col-md-4">
                        <div class="card">
                          <div class="card-body">
                            <h5 class="card-title">Общее количество минут</h5>
                            <p class="card-text display-6" id="totalMinutes">0</p>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div class="chart-container">
                      <canvas id="minutesChart"></canvas>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <footer class="main-footer">
        <strong>© 2025, <a href="https://ccrafters.ru/">CodeCrafters</a></strong>
      </footer>
    </div>

    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/adminlte.min.js"></script>
    <script src="/static/js/admin_dashboard.js"></script>
  </body>
</html>
