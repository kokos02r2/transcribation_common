<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CodeCrafters | API Токен</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="/admin-lte/plugins/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="/admin-lte/dist/css/adminlte.min.css">
</head>
<body class="hold-transition layout-top-nav">
<div class="wrapper">

  <nav class="main-header navbar navbar-expand-md navbar-light navbar-white">
    <div class="container">
      <a href="#" class="navbar-brand">
        <img src="/admin-lte/dist/img/AdminLTELogo.png" alt="AdminLTE Logo" class="brand-image img-circle elevation-3" style="opacity: .8">
        <span class="brand-text font-weight-light">CodeCrafters</span>
      </a>

      <button class="navbar-toggler order-1" type="button" data-toggle="collapse" data-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse order-3" id="navbarCollapse">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a href="/dashboard" class="nav-link">Статистика</a>
          </li>
          <li class="nav-item">
            <a href="/api_token" class="nav-link active">API токен</a>
          </li>
          <li class="nav-item">
            <a href="/webhook_token" class="nav-link">Webhook токен</a>
          </li>
        </ul>
      </div>

      <ul class="order-1 order-md-3 navbar-nav navbar-no-expand ml-auto">
        <li class="nav-item">
          <button id="logoutBtn" class="btn nav-link" title="Logout">
            <i class="fas fa-sign-out-alt"></i> Выход
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <div class="content-wrapper">
    <div class="content-header">
      <div class="container">
        <div class="row mb-2">
          <div class="col-sm-6">
            <h1 class="m-0">API Токен</h1>
          </div>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="container">
        <div class="row">
          <div class="col-lg-12">
            <div class="card">
              <div class="card-body">
                <p id="apiTokenDisplay">Токен не сгенерирован</p>
                <button id="generateApiTokenBtn" class="btn btn-primary">Сгенерировать API токен</button>
                <button id="deleteApiTokenBtn" class="btn btn-danger ml-2">Удалить API токен</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="main-footer">
    <strong>Copyright © 2014-2021 <a href="https://adminlte.io">AdminLTE.io</a>.</strong> All rights reserved.
  </footer>
</div>

<script src="/admin-lte/plugins/jquery/jquery.min.js"></script>
<script src="/admin-lte/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="/admin-lte/dist/js/adminlte.min.js"></script>

<script>
  // Проверка авторизации при загрузке страницы
  fetch('/audio_usage/', {
    method: 'POST',
    credentials: 'include',
  }).then(response => {
    if (response.status === 401) {
      window.location.href = '/login';
    }
  });

  // Генерация и удаление API токена
  document.getElementById('generateApiTokenBtn').addEventListener('click', async () => {
    try {
      const response = await fetch('/generate_api_token/', {
        method: 'POST',
        credentials: 'include',
      });
      if (!response.ok) throw new Error('Ошибка генерации API токена');
      const data = await response.json();
      document.getElementById('apiTokenDisplay').textContent = `API токен: ${data.api_token}`;
    } catch (error) {
      alert('Ошибка: ' + error.message);
    }
  });

  document.getElementById('deleteApiTokenBtn').addEventListener('click', async () => {
    try {
      const response = await fetch('/api/delete_api_token/', {
        method: 'DELETE',
        credentials: 'include',
      });
      if (!response.ok) throw new Error('Ошибка удаления API токена');
      const data = await response.json();
      document.getElementById('apiTokenDisplay').textContent = 'Токен не сгенерирован';
      alert(data.message);
    } catch (error) {
      alert('Ошибка: ' + error.message);
    }
  });
  // Обработчик выхода
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      const response = await fetch('/auth/jwt/logout', {
        method: 'POST',
        credentials: 'include',
      });
      if (!response.ok) throw new Error('Ошибка при выходе');
      window.location.href = '/login';
    } catch (error) {
      console.error('Ошибка:', error);
      alert('Ошибка при выходе');
    }
  });
</script>
</body>
</html>
