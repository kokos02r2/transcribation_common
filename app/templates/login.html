<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Сервис транскрипции | Личный кабинет</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="/static/css/all.min.css" />
    <link rel="stylesheet" href="/static/css/adminlte.min.css" />
    <link rel="stylesheet" href="/static/css/login.css" />
  </head>
  <body class="hold-transition login-page login-modern">
    <div class="login-shell">
      <div class="login-logo login-logo-modern">
        <h1>Личный кабинет</h1>
        <p>Вход в сервис транскрипции</p>
      </div>
      <div class="card login-card-modern">
        <div class="card-body login-card-body">
          <p class="login-box-msg">Введите ваши логин и пароль</p>
          <form id="loginForm" class="login-form-modern">
            <div class="form-group mb-3">
              <label class="form-label login-label" for="email">Почта</label>
              <div class="input-group-modern">
                <span class="fas fa-envelope input-icon"></span>
              <input
                type="email"
                id="email"
                class="form-control form-control-modern"
                placeholder="Почта"
                required
              />
              </div>
            </div>
            <div class="form-group mb-4">
              <label class="form-label login-label" for="password">Пароль</label>
              <div class="input-group-modern">
                <span class="fas fa-lock input-icon"></span>
              <input
                type="password"
                id="password"
                class="form-control form-control-modern"
                placeholder="Пароль"
                required
              />
              </div>
            </div>
            <div class="row">
              <div class="col-12">
                <button type="submit" class="btn btn-primary btn-block btn-login-modern">
                  Войти
                </button>
              </div>
            </div>
          </form>
          <div
            id="errorMsg"
            class="text-danger mt-2"
            style="display: none"
          ></div>
        </div>
      </div>
    </div>

    <script src="/static/js/jquery.min.js"></script>
    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/adminlte.min.js"></script>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const errorMsg = document.getElementById("errorMsg");

          try {
            const response = await fetch("/auth/jwt/login", {
              method: "POST",
              headers: {
                "Content-Type": "application/x-www-form-urlencoded",
              },
              body: new URLSearchParams({
                username: email,
                password: password,
              }),
              credentials: "include", // Отправляем и принимаем cookie
            });

            if (!response.ok) {
              const errorData = await response.json();
              throw new Error(errorData.detail || "Ошибка авторизации");
            }

            // Cookie устанавливается сервером, просто редиректим
            window.location.href = "/dashboard";
          } catch (error) {
            errorMsg.textContent = error.message;
            errorMsg.style.display = "block";
          }
        });
    </script>
  </body>
</html>
