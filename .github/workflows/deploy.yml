name: CI and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: python -m compileall app

  build_and_push:
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      image: ${{ steps.meta.outputs.image }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space before build
        run: |
          set -euxo pipefail
          echo "Disk usage before cleanup:"
          df -h
          if command -v docker >/dev/null 2>&1; then
            docker system df || true
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true
            docker volume prune -f || true
          fi
          echo "Disk usage after cleanup:"
          df -h

      - name: Prepare image meta
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.image_tag }}

      - name: Free disk space after build
        if: always()
        run: |
          set -euxo pipefail
          if command -v docker >/dev/null 2>&1; then
            docker container prune -f || true
            docker image prune -af || true
            docker builder prune -af || true
            docker volume prune -f || true
          fi
          echo "Disk usage after post-build cleanup:"
          df -h

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    environment: transcribation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          port: ${{ secrets.TIMEWEB_SSH_PORT }}
          source: "deploy/docker-compose.prod.yml,deploy/Caddyfile.prod,deploy/deploy.sh"
          target: "/opt/speech-diarization-common"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_IMAGE: ${{ needs.build_and_push.outputs.image }}
          IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.TIMEWEB_HOST }}
          username: ${{ secrets.TIMEWEB_USER }}
          key: ${{ secrets.TIMEWEB_SSH_KEY }}
          port: ${{ secrets.TIMEWEB_SSH_PORT }}
          command_timeout: 120m
          envs: APP_IMAGE,IMAGE_TAG,DEPLOY_ENV_FILE,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            mkdir -p /opt/speech-diarization-common/deploy

            printf '%s\n' "${DEPLOY_ENV_FILE}" > /opt/speech-diarization-common/deploy/.env
            tmp_file="/opt/speech-diarization-common/deploy/.env.tmp"
            grep -vE '^(APP_IMAGE|IMAGE_TAG)=' /opt/speech-diarization-common/deploy/.env > "${tmp_file}" || true
            mv "${tmp_file}" /opt/speech-diarization-common/deploy/.env
            echo "APP_IMAGE=${APP_IMAGE}" >> /opt/speech-diarization-common/deploy/.env
            echo "IMAGE_TAG=${IMAGE_TAG}" >> /opt/speech-diarization-common/deploy/.env

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            cd /opt/speech-diarization-common
            chmod +x deploy/deploy.sh
            bash deploy/deploy.sh "${IMAGE_TAG}"
